# Enable debug logs for Spring
logging.level.org.springframework=debug

# ===============================
# H2 DATABASE CONFIGURATION
# ===============================

# Use file-based database (data will persist after restart)
spring.datasource.url=jdbc:h2:file:./data/tododb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===============================
# H2 CONSOLE
# ===============================

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# JPA / HIBERNATE
# ===============================

# Automatically create/update tables
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Allow data.sql to run after schema creation
spring.jpa.defer-datasource-initialization=true

# Hibernate dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ===============================
# SPRING BOOT SETTINGS
# ===============================
server.port=5000
spring.main.banner-mode=off

# Console log format
logging.pattern.console=%d{MM-dd HH:mm:ss} - %logger{36} - %msg%n